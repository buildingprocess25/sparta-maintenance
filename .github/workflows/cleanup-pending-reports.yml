name: Cleanup Pending Reports

on:
    schedule:
        # Every day at 1:00 AM UTC (1 hour after backup)
        - cron: "0 1 * * *"
    # Allow manual trigger from GitHub Actions UI
    workflow_dispatch:

jobs:
    cleanup:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run cleanup pending reports
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.DIRECT_URL }}
                  UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
              run: npx tsx scripts/cleanup-pending-reports.ts

            - name: Notify on failure
              if: failure()
              run: echo "❌ Cleanup failed! Check logs above."
