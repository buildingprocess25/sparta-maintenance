name: Cleanup Approved PJUM Photos

on:
    schedule:
        # Every day at 2:00 AM UTC (after pending reports cleanup)
        - cron: "0 2 * * *"
    # Allow manual trigger from GitHub Actions UI
    workflow_dispatch:

jobs:
    cleanup:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run cleanup approved photos script
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.DIRECT_URL }}
                  UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
                  DRIVE_CDN_CLIENT_ID: ${{ secrets.DRIVE_CDN_CLIENT_ID }}
                  DRIVE_CDN_CLIENT_SECRET: ${{ secrets.DRIVE_CDN_CLIENT_SECRET }}
                  DRIVE_CDN_REFRESH_TOKEN: ${{ secrets.DRIVE_CDN_REFRESH_TOKEN }}
                  DRIVE_CDN_ROOT_FOLDER_ID: ${{ secrets.DRIVE_CDN_ROOT_FOLDER_ID }}
              run: npx tsx scripts/cleanup-approved-pjum-photos.ts --execute

            - name: Notify on failure
              if: failure()
              run: echo "❌ Cleanup failed! Check logs above."
