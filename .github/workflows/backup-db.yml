name: Daily Database Backup

on:
  schedule:
    # Every day at 12:00 AM UTC (adjust timezone as needed)
    - cron: "0 12 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install pg_dump (PostgreSQL 17)
        run: |
          sudo apt-get install -y curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor --batch --yes | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg > /dev/null
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] http://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Install dependencies
        run: npm ci

      - name: Run database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          BACKUP_DRIVE_FOLDER_ID: ${{ secrets.BACKUP_DRIVE_FOLDER_ID }}
        run: PATH="/usr/lib/postgresql/17/bin:$PATH" npx tsx scripts/backup-db.ts

      - name: Upload backup as artifact (7 days retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: echo "❌ Backup failed! Check logs above."
