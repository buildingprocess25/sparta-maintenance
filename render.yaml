services:
    - type: web
      name: sparta-maintenance
      runtime: docker
      plan: free
      autoDeploy: true
      healthCheckPath: /api/health
      envVars:
          - key: NODE_ENV
            value: production
          - key: DATABASE_URL
            sync: false
          - key: DIRECT_URL
            sync: false
          - key: SESSION_SECRET
            sync: false
          - key: NEXT_PUBLIC_SUPABASE_URL
            sync: false
          - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
            sync: false
          - key: APP_BASE_URL
            sync: false
          - key: NEXT_PUBLIC_APP_URL
            sync: false
          - key: GMAIL_USER
            sync: false
          - key: GOOGLE_CLIENT_ID
            sync: false
          - key: GOOGLE_CLIENT_SECRET
            sync: false
          - key: GOOGLE_REFRESH_TOKEN
            sync: false
          - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
            sync: false
          - key: MAINTENANCE_MODE
            value: "false"
          - key: REQUEST_LOG_ENABLED
            value: "true"
          - key: REQUEST_LOG_SAMPLE_RATE
            value: "0.15"
          - key: REQUEST_LOG_SLOW_MS
            value: "1200"
          - key: CRON_SECRET
            sync: false
          - key: CLEANUP_PENDING_EXPIRY_DAYS
            value: "14"
          - key: UPLOADTHING_TOKEN
            sync: false
